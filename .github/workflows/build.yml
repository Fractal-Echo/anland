name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653"

      - name: Build display_daemon and Magisk Module
        run: |
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/25.2.9519653"
          chmod +x build_daemon_android.sh build_magisk_module.sh
          ./build_magisk_module.sh
          # Renomeia para coincidir com o nome esperado pelo usuario
          cp anland-daemon.zip virtual-drm-daemon.zip

      - name: Build Android App Client
        run: |
          cd consumers/anland/android_consumer
          chmod +x gradlew
          ./gradlew assembleDebug
          # Copia o apk gerado para o diretorio raiz para facilitar o upload
          cp app/build/outputs/apk/debug/app-debug.apk ../../../

      - name: Upload Artifacts (Actions)
        uses: actions/upload-artifact@v4
        with:
          name: anland-builds
          path: |
            virtual-drm-daemon.zip
            app-debug.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            virtual-drm-daemon.zip
            app-debug.apk
          tag_name: ${{ github.ref_name || 'latest' }}
          name: Release ${{ github.ref_name || 'Latest Build' }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
